<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0612" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Interstellar</title>
    <!--
      Telegram-WebApp скрипт. Хостим у себя в /public/telegram-web-app.js
      вместо https://telegram.org/js/telegram-web-app.js — иначе у юзеров
      с MTProto-прокси (или просто заблокированным telegram.org у провайдера)
      Mini App не грузился: домен telegram.org часто блочат ровно те же ISP,
      из-за которых юзер и включил MTProto. Сам Mini App уже доступен (раз
      юзер сюда дошёл), значит и скрипт с нашего домена догрузится. Файл
      обновляем редко (Telegram бампит API раз в несколько месяцев) — пере-
      качиваем при необходимости через прокси (см. README).
    -->
    <script src="/telegram-web-app.js"></script>
  </head>
  <body>
    <!--
      Loading screen — встроен прямо в HTML чтобы юзер увидел анимацию
      МОМЕНТАЛЬНО (до загрузки JS-бандла). createRoot(...).render() в
      main.tsx заменит содержимое #root когда React смонтируется.
      Если init Telegram падает — main.tsx тоже перезапишет innerHTML
      на landing-страницу.
    -->
    <div id="root">
      <div class="initial-loader">
        <div class="il-pulse"></div>
        <div class="il-logo-wrap">
          <svg width="56" height="56" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="14" stroke="#fff" stroke-width="1.8" />
            <circle cx="16" cy="16" r="4" fill="#fff" />
          </svg>
        </div>
        <h1 class="il-title">интерстеллар</h1>
        <div class="il-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <style>
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #0a0612 0%, #000 100%);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        z-index: 9999;
      }
      .il-logo-wrap {
        position: relative;
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: il-float 2.4s ease-in-out infinite;
      }
      .il-pulse {
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(124, 92, 255, 0.45) 0%,
          rgba(255, 92, 219, 0.18) 45%,
          transparent 70%
        );
        animation: il-pulse-anim 2.4s ease-in-out infinite;
        filter: blur(2px);
      }
      .il-title {
        margin: 28px 0 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.6px;
        background: linear-gradient(135deg, #c9b8ff, #ff9ee6);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .il-dots {
        display: flex;
        gap: 6px;
        margin-top: 22px;
      }
      .il-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #7c5cff;
        opacity: 0.4;
        animation: il-dot 1.4s ease-in-out infinite;
      }
      .il-dots span:nth-child(2) { animation-delay: 0.2s; }
      .il-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes il-float {
        0%, 100% { transform: translateY(0) scale(1); }
        50%      { transform: translateY(-4px) scale(1.05); }
      }
      @keyframes il-pulse-anim {
        0%, 100% { transform: scale(0.85); opacity: 0.7; }
        50%      { transform: scale(1.15); opacity: 1; }
      }
      @keyframes il-dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
        40%           { opacity: 1;   transform: scale(1.25); }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
