<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0612" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Interstellar</title>
    <!--
      Telegram-WebApp скрипт. Хостим у себя в /public/telegram-web-app.js
      вместо https://telegram.org/js/telegram-web-app.js — иначе у юзеров
      с MTProto-прокси (или просто заблокированным telegram.org у провайдера)
      Mini App не грузился: домен telegram.org часто блочат ровно те же ISP,
      из-за которых юзер и включил MTProto. Сам Mini App уже доступен (раз
      юзер сюда дошёл), значит и скрипт с нашего домена догрузится. Файл
      обновляем редко (Telegram бампит API раз в несколько месяцев) — пере-
      качиваем при необходимости через прокси (см. README).
    -->
    <script src="/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
